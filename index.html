<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>古文単語チェックテスト</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --card: #fffdf8;
      --text: #2b2926;
      --muted: #766f66;
      --accent: #7a4f2a;
      --accent-dark: #5f3a1d;
      --line: #e3d8c8;
      --answer-bg: #f2eadf;
      --shadow: 0 10px 28px rgba(77, 54, 32, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at top, #fffaf0 0%, var(--bg) 45%, #efe6d8 100%);
      color: var(--text);
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 4vw, 2.5rem);
      letter-spacing: 0.04em;
    }

    .description {
      margin: 0 auto;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.7;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      align-items: end;
      margin: 24px 0 14px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      padding-left: 4px;
    }

    button, select {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    button {
      background: var(--accent);
      color: white;
      box-shadow: 0 7px 16px rgba(122, 79, 42, 0.25);
    }

    button:hover { background: var(--accent-dark); transform: translateY(-1px); }
    button:active { transform: translateY(0); box-shadow: none; }

    .secondary {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    select {
      width: 100%;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 8px 0 22px;
    }

    .status {
      text-align: center;
      color: var(--muted);
      margin-bottom: 18px;
      min-height: 1.5em;
    }

    .quiz {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .question-number {
      font-weight: 800;
      color: var(--accent);
    }

    .sentence {
      font-size: clamp(1.1rem, 2.8vw, 1.45rem);
      line-height: 1.9;
      margin: 0 0 6px;
    }

    .source {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0 0 14px;
    }

    .target {
      text-decoration: underline;
      text-decoration-thickness: 0.14em;
      text-underline-offset: 0.22em;
      font-weight: 800;
      background: linear-gradient(transparent 62%, rgba(196, 146, 82, 0.28) 62%);
      border-radius: 4px;
      padding: 0 0.08em;
    }

    .answer {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--answer-bg);
      line-height: 1.7;
    }

    .answer.visible { display: block; }

    .answer-label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .base {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .empty, .error {
      background: #fff0f0;
      border: 1px solid #f0b9b9;
      color: #8a1f1f;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.7;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 760px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 560px) {
      .app { padding: 22px 12px 36px; }
      .toolbar { grid-template-columns: 1fr; }
      .actions { align-items: stretch; }
      button { width: 100%; }
      .card { padding: 17px; border-radius: 18px; }
      .card-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>古文単語チェックテスト</h1>
      <p class="description">出典や単語の行で絞り込んで、例文リストからランダムに出題します。下線部の意味を考えてから、「解答を見る」を押してください。</p>
    </header>

    <section class="toolbar" aria-label="出題設定">
      <div class="control">
        <label for="questionCount">出題数</label>
        <select id="questionCount" aria-label="出題数">
          <option value="10" selected>10問</option>
          <option value="5">5問</option>
          <option value="20">20問</option>
          <option value="50">50問</option>
        </select>
      </div>

      <div class="control">
        <label for="sourceFilter">出典</label>
        <select id="sourceFilter" aria-label="出典で絞り込み">
          <option value="">すべての出典</option>
        </select>
      </div>

      <div class="control">
        <label for="rowFilter">単語の行</label>
        <select id="rowFilter" aria-label="baseの行で絞り込み">
          <option value="">すべての行</option>
          <option value="ア行">ア行</option>
          <option value="カ行">カ行</option>
          <option value="サ行">サ行</option>
          <option value="タ行">タ行</option>
          <option value="ナ行">ナ行</option>
          <option value="ハ行">ハ行</option>
          <option value="マ行">マ行</option>
          <option value="ヤ行">ヤ行</option>
          <option value="ラ行">ラ行</option>
          <option value="ワ行">ワ行</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <button id="newQuizButton">ランダム出題</button>
    </section>

    <section class="actions" aria-label="解答操作">
      <button id="showAllButton" class="secondary">すべて解答表示</button>
      <button id="hideAllButton" class="secondary">すべて隠す</button>
      <button id="resetFilterButton" class="secondary">フィルタ解除</button>
    </section>

    <div id="status" class="status">読み込み中...</div>
    <section id="quiz" class="quiz" aria-live="polite"></section>

    <footer>採点なし・解答確認用</footer>
  </main>

  <script>
    const DATA_URL = "kobun_app_data_inflected_updated.json";
    let allQuestions = [];
    let currentQuestions = [];

    const quizEl = document.getElementById("quiz");
    const statusEl = document.getElementById("status");
    const questionCountEl = document.getElementById("questionCount");
    const sourceFilterEl = document.getElementById("sourceFilter");
    const rowFilterEl = document.getElementById("rowFilter");

    const rowMap = {
      "あ": "ア行", "い": "ア行", "う": "ア行", "え": "ア行", "お": "ア行",
      "か": "カ行", "き": "カ行", "く": "カ行", "け": "カ行", "こ": "カ行", "が": "カ行", "ぎ": "カ行", "ぐ": "カ行", "げ": "カ行", "ご": "カ行",
      "さ": "サ行", "し": "サ行", "す": "サ行", "せ": "サ行", "そ": "サ行", "ざ": "サ行", "じ": "サ行", "ず": "サ行", "ぜ": "サ行", "ぞ": "サ行",
      "た": "タ行", "ち": "タ行", "つ": "タ行", "て": "タ行", "と": "タ行", "だ": "タ行", "ぢ": "タ行", "づ": "タ行", "で": "タ行", "ど": "タ行",
      "な": "ナ行", "に": "ナ行", "ぬ": "ナ行", "ね": "ナ行", "の": "ナ行",
      "は": "ハ行", "ひ": "ハ行", "ふ": "ハ行", "へ": "ハ行", "ほ": "ハ行", "ば": "ハ行", "び": "ハ行", "ぶ": "ハ行", "べ": "ハ行", "ぼ": "ハ行", "ぱ": "ハ行", "ぴ": "ハ行", "ぷ": "ハ行", "ぺ": "ハ行", "ぽ": "ハ行",
      "ま": "マ行", "み": "マ行", "む": "マ行", "め": "マ行", "も": "マ行",
      "や": "ヤ行", "ゆ": "ヤ行", "よ": "ヤ行",
      "ら": "ラ行", "り": "ラ行", "る": "ラ行", "れ": "ラ行", "ろ": "ラ行",
      "わ": "ワ行", "ゐ": "ワ行", "ゑ": "ワ行", "を": "ワ行", "ん": "ワ行"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normalizeKana(value) {
      return String(value ?? "").trim().replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    function getBaseRow(base) {
      const first = normalizeKana(base).charAt(0);
      return rowMap[first] || "その他";
    }

    function renderSentence(sentence, target) {
      const safeSentence = escapeHtml(sentence);
      const safeTarget = escapeHtml(target);

      if (!target || !String(sentence).includes(String(target))) {
        return safeSentence;
      }

      const pattern = new RegExp(escapeRegExp(safeTarget), "g");
      return safeSentence.replace(pattern, `<span class="target">${safeTarget}</span>`);
    }

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function getFilteredQuestions() {
      const selectedSource = sourceFilterEl.value;
      const selectedRow = rowFilterEl.value;

      return allQuestions.filter(q => {
        const sourceOk = !selectedSource || String(q.source ?? "") === selectedSource;
        const rowOk = !selectedRow || getBaseRow(q.base) === selectedRow;
        return sourceOk && rowOk;
      });
    }

    function createQuiz() {
      const filtered = getFilteredQuestions();
      const count = Number(questionCountEl.value);
      currentQuestions = shuffle(filtered).slice(0, Math.min(count, filtered.length));
      renderQuiz(filtered.length);
    }

    function renderQuiz(filteredCount) {
      quizEl.innerHTML = "";

      if (currentQuestions.length === 0) {
        statusEl.textContent = `${allQuestions.length}件中、条件に合う問題は0件です`;
        quizEl.innerHTML = `<div class="empty">条件に合う問題がありません。フィルタを変更してください。</div>`;
        return;
      }

      currentQuestions.forEach((q, index) => {
        const card = document.createElement("article");
        card.className = "card";

        const number = q.number ? `No. ${escapeHtml(q.number)}` : "";
        const sentenceHtml = renderSentence(q.sentence, q.target);
        const sourceText = q.source ? `出典：${escapeHtml(q.source)}` : "出典：未設定";
        const baseText = q.base ? `<div class="base">原形：${escapeHtml(q.base)}</div>` : "";

        card.innerHTML = `
          <div class="card-head">
            <span class="question-number">Q${index + 1}</span>
            <span>${number}</span>
          </div>
          <p class="sentence">${sentenceHtml}</p>
          <div class="source">${sourceText}</div>
          <button type="button" class="answer-button" data-index="${index}">解答を見る</button>
          <div class="answer" id="answer-${index}">
            <span class="answer-label">模範解答</span>
            <div>${escapeHtml(q.answer)}</div>
            ${baseText}
          </div>
        `;
        quizEl.appendChild(card);
      });

      statusEl.textContent = `${allQuestions.length}件中、条件に合う${filteredCount}件から${currentQuestions.length}問を表示中`;
    }

    function toggleAnswer(index) {
      const answerEl = document.getElementById(`answer-${index}`);
      const button = document.querySelector(`.answer-button[data-index="${index}"]`);
      const visible = answerEl.classList.toggle("visible");
      button.textContent = visible ? "解答を隠す" : "解答を見る";
    }

    function setAllAnswers(visible) {
      currentQuestions.forEach((_, index) => {
        const answerEl = document.getElementById(`answer-${index}`);
        const button = document.querySelector(`.answer-button[data-index="${index}"]`);
        if (!answerEl || !button) return;
        answerEl.classList.toggle("visible", visible);
        button.textContent = visible ? "解答を隠す" : "解答を見る";
      });
    }

    function populateSourceFilter() {
      const sources = [...new Set(allQuestions.map(q => String(q.source ?? "").trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ja"));

      sources.forEach(source => {
        const option = document.createElement("option");
        option.value = source;
        option.textContent = source;
        sourceFilterEl.appendChild(option);
      });
    }

    function resetFilters() {
      sourceFilterEl.value = "";
      rowFilterEl.value = "";
      createQuiz();
    }

    quizEl.addEventListener("click", (event) => {
      const button = event.target.closest(".answer-button");
      if (!button) return;
      toggleAnswer(Number(button.dataset.index));
    });

    document.getElementById("newQuizButton").addEventListener("click", createQuiz);
    document.getElementById("showAllButton").addEventListener("click", () => setAllAnswers(true));
    document.getElementById("hideAllButton").addEventListener("click", () => setAllAnswers(false));
    document.getElementById("resetFilterButton").addEventListener("click", resetFilters);
    questionCountEl.addEventListener("change", createQuiz);
    sourceFilterEl.addEventListener("change", createQuiz);
    rowFilterEl.addEventListener("change", createQuiz);

    async function loadData() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        allQuestions = await response.json();
        allQuestions = allQuestions.filter(q => q && q.sentence && q.answer);
        populateSourceFilter();
        createQuiz();
      } catch (error) {
        statusEl.textContent = "";
        quizEl.innerHTML = `
          <div class="error">
            <strong>データを読み込めませんでした。</strong><br>
            公開時は index.html と kobun_app_data_inflected_updated.json を同じフォルダに置いてください。<br>
            ローカルで直接HTMLを開く場合は、ブラウザの制限でJSONを読み込めないことがあります。
          </div>
        `;
        console.error(error);
      }
    }

    loadData();
  </script>
</body>
</html>
