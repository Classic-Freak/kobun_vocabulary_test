<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>古文単語例文テスト</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --card: #fffdf8;
      --text: #2b2926;
      --muted: #766f66;
      --accent: #7a4f2a;
      --accent-dark: #5f3a1d;
      --line: #e3d8c8;
      --answer-bg: #f2eadf;
      --shadow: 0 10px 28px rgba(77, 54, 32, 0.12);
      --save-bg: #fff7e8;
      --save-text: #7a4f2a;
      --save-border: #d7b88d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at top, #fffaf0 0%, var(--bg) 45%, #efe6d8 100%);
      color: var(--text);
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 4vw, 2.5rem);
      letter-spacing: 0.04em;
    }

    .description {
      margin: 0 auto;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.7;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
      align-items: end;
      margin: 24px 0 14px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      padding-left: 4px;
    }

    button, select {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    button {
      background: var(--accent);
      color: white;
      box-shadow: 0 7px 16px rgba(122, 79, 42, 0.25);
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .secondary {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .danger {
      background: #fff;
      color: #9a3a2f;
      border: 1px solid #e4beb9;
      box-shadow: none;
    }

    .print-button {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
    }

    select {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .status {
      text-align: center;
      color: var(--muted);
      margin-bottom: 18px;
      min-height: 1.5em;
      line-height: 1.7;
    }

    .quiz {
      display: grid;
      gap: 16px;
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px 20px 20px;
      box-shadow: var(--shadow);
    }

    .save-review-button {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--save-bg);
      color: var(--save-text);
      border: 1px solid var(--save-border);
      box-shadow: none;
      padding: 8px 12px;
      font-size: 0.86rem;
      line-height: 1;
    }

    .save-review-button.saved {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 8px 96px 12px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .question-number {
      font-weight: 800;
      color: var(--accent);
    }

    .sentence {
      font-size: clamp(1.1rem, 2.8vw, 1.45rem);
      line-height: 1.9;
      margin: 0 0 6px;
    }

    .source {
      text-align: right;
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0 0 14px;
    }

    .target {
      text-decoration: underline;
      text-decoration-thickness: 0.14em;
      text-underline-offset: 0.22em;
      font-weight: 800;
      background: linear-gradient(transparent 62%, rgba(196, 146, 82, 0.28) 62%);
      border-radius: 4px;
      padding: 0 0.08em;
    }

    .answer {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--answer-bg);
      line-height: 1.7;
    }

    .answer.visible { display: block; }

    .answer-label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .base {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .error {
      background: #fff0f0;
      border: 1px solid #f0b9b9;
      color: #8a1f1f;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.7;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11100f;
        --card: #211d19;
        --text: #fff7ec;
        --muted: #d0c0ad;
        --accent: #f0b36a;
        --accent-dark: #d89448;
        --line: #5a4a3a;
        --answer-bg: #332a22;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.48);
        --save-bg: #3a2d22;
        --save-text: #ffdca8;
        --save-border: #8c6741;
      }

      body {
        background: radial-gradient(circle at top, #342a21 0%, var(--bg) 52%, #080807 100%);
      }

      select,
      .secondary,
      .danger {
        background: #2a241e;
        color: var(--text);
        border-color: var(--line);
      }

      .danger {
        color: #ffb7ad;
      }

      .target {
        color: #fffaf2;
        text-decoration-color: #ffd18f;
        background: linear-gradient(transparent 58%, rgba(240, 179, 106, 0.42) 58%);
      }

      .answer {
        border: 1px solid #4f4032;
      }

      .error {
        background: #3a1f1f;
        border-color: #a55a5a;
        color: #ffe0e0;
      }
    }

    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app { padding: 22px 12px 36px; }
      .toolbar { grid-template-columns: 1fr; }
      button, select { width: 100%; }
      .card { padding: 54px 17px 17px; border-radius: 18px; }
      .save-review-button {
        width: auto;
        position: absolute;
        top: 12px;
        right: 12px;
      }
      .card-head {
        margin: 0 0 12px;
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 14mm 12mm;
      }

      html, body {
        background: #fff !important;
        color: #111 !important;
        font-family: "Yu Mincho", "Hiragino Mincho ProN", "Yu Gothic", serif !important;
      }

      .app {
        width: 100% !important;
        max-width: none !important;
        padding: 0 !important;
      }

      .screen-only {
        display: none !important;
      }

      .print-section {
        display: block !important;
      }

      .print-page {
        page-break-after: always;
      }

      .print-page:last-child {
        page-break-after: auto;
      }

      .print-title {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 2px solid #111;
        padding-bottom: 3mm;
        margin-bottom: 6mm;
      }

      .print-title h2 {
        margin: 0;
        font-size: 18pt;
        letter-spacing: 0.08em;
      }

      .print-meta {
        font-size: 10pt;
      }

      .print-list {
        display: grid;
        gap: 4mm;
      }

      .print-item {
        break-inside: avoid;
        page-break-inside: avoid;
        border: 1px solid #222;
        padding: 4mm;
        background: #fff !important;
      }

      .print-question-head {
        display: flex;
        justify-content: space-between;
        gap: 8mm;
        font-size: 10pt;
        margin-bottom: 2mm;
      }

      .print-qno {
        font-weight: bold;
      }

      .print-source {
        text-align: right;
        color: #333 !important;
      }

      .print-sentence {
        font-size: 12.5pt;
        line-height: 1.9;
        margin: 0;
      }

      .print-answer-box {
        margin-top: 2.5mm;
        padding-top: 2.5mm;
        border-top: 1px dashed #555;
        font-size: 11pt;
        line-height: 1.7;
      }

      .target {
        text-decoration: underline !important;
        text-decoration-thickness: 1.5px !important;
        text-underline-offset: 3px !important;
        background: transparent !important;
        color: #111 !important;
        font-weight: bold !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="screen-only">
      <header>
        <h1>古文単語例文テスト</h1>
        <p class="description">例文リストからランダムに出題します。下線部の意味を考えてから、「解答を見る」を押してください。</p>
      </header>

      <section class="toolbar" aria-label="出題設定">
        <div class="control">
          <label for="questionCount">出題数</label>
          <select id="questionCount" aria-label="出題数">
            <option value="10" selected>10問</option>
            <option value="5">5問</option>
            <option value="20">20問</option>
          </select>
        </div>

        <div class="control">
          <label for="sourceFilter">出典</label>
          <select id="sourceFilter" aria-label="出典で絞り込み">
            <option value="">すべての出典</option>
          </select>
        </div>

        <div class="control">
          <label for="rowFilter">単語の行</label>
          <select id="rowFilter" aria-label="単語の行で絞り込み">
            <option value="">すべての行</option>
            <option value="ア行">ア行</option>
            <option value="カ行">カ行</option>
            <option value="サ行">サ行</option>
            <option value="タ行">タ行</option>
            <option value="ナ行">ナ行</option>
            <option value="ハ行">ハ行</option>
            <option value="マ行">マ行</option>
            <option value="ヤ行">ヤ行</option>
            <option value="ラ行">ラ行</option>
            <option value="ワ行">ワ行</option>
          </select>
        </div>

        <button id="newQuizButton">ランダム出題</button>
        <button id="showAllButton" class="secondary">すべて解答表示</button>
        <button id="hideAllButton" class="secondary">すべて隠す</button>
        <button id="resetFilterButton" class="secondary">フィルタ解除</button>
        <button id="reviewModeButton" class="secondary">保存済みを出題</button>
        <button id="clearSavedButton" class="danger">保存済みを削除</button>
        <button id="printButton" class="print-button">🖨️ 印刷（問題＋解答）</button>
      </section>

      <div id="status" class="status">読み込み中...</div>
      <section id="quiz" class="quiz" aria-live="polite"></section>

      <footer>採点なし・解答確認用</footer>
    </div>

    <section id="printSection" class="print-section" aria-hidden="true" style="display:none;"></section>
  </main>

  <script>
    const DATA_URLS = [
      "kobun_app_data_inflected_updated_target_fixed.json",
      "kobun_app_data_inflected_updated.json"
    ];
    const STORAGE_KEY = "kobunReviewQuestions";

    let allQuestions = [];
    let currentQuestions = [];
    let reviewMode = false;

    const quizEl = document.getElementById("quiz");
    const statusEl = document.getElementById("status");
    const questionCountEl = document.getElementById("questionCount");
    const sourceFilterEl = document.getElementById("sourceFilter");
    const rowFilterEl = document.getElementById("rowFilter");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function renderSentence(sentence, target) {
      const safeSentence = escapeHtml(sentence);
      if (!target || !String(sentence).includes(String(target))) {
        return safeSentence;
      }
      const safeTarget = escapeHtml(target);
      const pattern = new RegExp(escapeRegExp(safeTarget), "g");
      return safeSentence.replace(pattern, `<span class="target">${safeTarget}</span>`);
    }

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function getQuestionId(q) {
      return `${q.sentence || ""}__${q.target || ""}__${q.answer || ""}`;
    }

    function loadSavedQuestions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveSavedQuestions(saved) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }

    function isQuestionSaved(q) {
      const id = getQuestionId(q);
      return loadSavedQuestions().some(item => getQuestionId(item) === id);
    }

    function toggleSaveQuestion(index) {
      const q = currentQuestions[index];
      if (!q) return;

      const id = getQuestionId(q);
      let saved = loadSavedQuestions();
      const exists = saved.some(item => getQuestionId(item) === id);

      if (exists) {
        saved = saved.filter(item => getQuestionId(item) !== id);
      } else {
        saved.push(q);
      }

      saveSavedQuestions(saved);
      renderQuiz(getCandidateQuestions().length);
    }

    function getRowLabel(text) {
      const first = String(text || "").trim().charAt(0);
      const map = {
        "あ": "ア行", "い": "ア行", "う": "ア行", "え": "ア行", "お": "ア行",
        "か": "カ行", "き": "カ行", "く": "カ行", "け": "カ行", "こ": "カ行", "が": "カ行", "ぎ": "カ行", "ぐ": "カ行", "げ": "カ行", "ご": "カ行",
        "さ": "サ行", "し": "サ行", "す": "サ行", "せ": "サ行", "そ": "サ行", "ざ": "サ行", "じ": "サ行", "ず": "サ行", "ぜ": "サ行", "ぞ": "サ行",
        "た": "タ行", "ち": "タ行", "つ": "タ行", "て": "タ行", "と": "タ行", "だ": "タ行", "ぢ": "タ行", "づ": "タ行", "で": "タ行", "ど": "タ行",
        "な": "ナ行", "に": "ナ行", "ぬ": "ナ行", "ね": "ナ行", "の": "ナ行",
        "は": "ハ行", "ひ": "ハ行", "ふ": "ハ行", "へ": "ハ行", "ほ": "ハ行", "ば": "ハ行", "び": "ハ行", "ぶ": "ハ行", "べ": "ハ行", "ぼ": "ハ行", "ぱ": "ハ行", "ぴ": "ハ行", "ぷ": "ハ行", "ぺ": "ハ行", "ぽ": "ハ行",
        "ま": "マ行", "み": "マ行", "む": "マ行", "め": "マ行", "も": "マ行",
        "や": "ヤ行", "ゆ": "ヤ行", "よ": "ヤ行",
        "ら": "ラ行", "り": "ラ行", "る": "ラ行", "れ": "ラ行", "ろ": "ラ行",
        "わ": "ワ行", "ゐ": "ワ行", "ゑ": "ワ行", "を": "ワ行", "ん": "ワ行"
      };
      return map[first] || "";
    }

    function populateSourceFilter() {
      const sources = [...new Set(allQuestions.map(q => q.source).filter(Boolean))].sort();
      sourceFilterEl.innerHTML = `<option value="">すべての出典</option>`;
      sources.forEach(source => {
        const option = document.createElement("option");
        option.value = source;
        option.textContent = source;
        sourceFilterEl.appendChild(option);
      });
    }

    function getFilteredQuestions() {
      const source = sourceFilterEl.value;
      const row = rowFilterEl.value;

      return allQuestions.filter(q => {
        const matchSource = !source || q.source === source;
        const matchRow = !row || getRowLabel(q.base) === row;
        return matchSource && matchRow;
      });
    }

    function getCandidateQuestions() {
      return reviewMode ? loadSavedQuestions() : getFilteredQuestions();
    }

    function createQuiz() {
      reviewMode = false;
      const candidates = getFilteredQuestions();
      const count = Number(questionCountEl.value);
      currentQuestions = shuffle(candidates).slice(0, Math.min(count, candidates.length));
      renderQuiz(candidates.length);
    }

    function createReviewQuiz() {
      reviewMode = true;
      const candidates = loadSavedQuestions();
      const count = Number(questionCountEl.value);
      currentQuestions = shuffle(candidates).slice(0, Math.min(count, candidates.length));
      renderQuiz(candidates.length);
    }

    function renderQuiz(candidateCount) {
      quizEl.innerHTML = "";

      if (!currentQuestions.length) {
        quizEl.innerHTML = `<div class="error">表示できる問題がありません。条件を変更してください。</div>`;
        statusEl.textContent = `該当 ${candidateCount ?? 0}件`;
        buildPrintSection();
        return;
      }

      currentQuestions.forEach((q, index) => {
        const card = document.createElement("article");
        card.className = "card";

        const number = q.number ? `No. ${escapeHtml(q.number)}` : "";
        const sentenceHtml = renderSentence(q.sentence, q.target);
        const baseText = q.base ? `<div class="base">単語：${escapeHtml(q.base)}</div>` : "";
        const sourceText = q.source ? `出典：${escapeHtml(q.source)}` : "";
        const saved = isQuestionSaved(q);

        card.innerHTML = `
          <button type="button" class="save-review-button ${saved ? "saved" : ""}" data-index="${index}">
            ${saved ? "★ 保存解除" : "☆ 復習用に保存"}
          </button>
          <div class="card-head">
            <span class="question-number">Q${index + 1}</span>
            <span>${number}</span>
          </div>
          <p class="sentence">${sentenceHtml}</p>
          <div class="source">${sourceText}</div>
          <button type="button" class="answer-button" data-index="${index}">解答を見る</button>
          <div class="answer" id="answer-${index}">
            <span class="answer-label">模範解答</span>
            <div>${escapeHtml(q.answer)}</div>
            ${baseText}
          </div>
        `;
        quizEl.appendChild(card);
      });

      const savedCount = loadSavedQuestions().length;
      statusEl.textContent = reviewMode
        ? `保存済み ${candidateCount}件から${currentQuestions.length}問を表示中`
        : `該当 ${candidateCount}件から${currentQuestions.length}問を表示中 ／ 保存済み ${savedCount}件`;

      buildPrintSection();
    }

    function toggleAnswer(index) {
      const answerEl = document.getElementById(`answer-${index}`);
      const button = document.querySelector(`.answer-button[data-index="${index}"]`);
      if (!answerEl || !button) return;
      const visible = answerEl.classList.toggle("visible");
      button.textContent = visible ? "解答を隠す" : "解答を見る";
    }

    function setAllAnswers(visible) {
      currentQuestions.forEach((_, index) => {
        const answerEl = document.getElementById(`answer-${index}`);
        const button = document.querySelector(`.answer-button[data-index="${index}"]`);
        if (!answerEl || !button) return;
        answerEl.classList.toggle("visible", visible);
        button.textContent = visible ? "解答を隠す" : "解答を見る";
      });
    }

    function resetFilters() {
      sourceFilterEl.value = "";
      rowFilterEl.value = "";
      createQuiz();
    }

    function clearSavedQuestions() {
      if (!confirm("保存済み問題をすべて削除しますか？")) return;
      localStorage.removeItem(STORAGE_KEY);
      if (reviewMode) createReviewQuiz();
      else renderQuiz(getFilteredQuestions().length);
    }

    function buildPrintSection() {
      const printSection = document.getElementById("printSection");
      if (!printSection) return;

      const now = new Date();
      const dateText = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
      const questions = currentQuestions || [];

      const questionItems = questions.map((q, i) => `
        <article class="print-item">
          <div class="print-question-head">
            <span class="print-qno">問${i + 1}</span>
            <span class="print-source">出典：${escapeHtml(q.source || "")}</span>
          </div>
          <p class="print-sentence">${renderSentence(q.sentence, q.target)}</p>
        </article>
      `).join("");

      const answerItems = questions.map((q, i) => `
        <article class="print-item">
          <div class="print-question-head">
            <span class="print-qno">問${i + 1}</span>
            <span class="print-source">出典：${escapeHtml(q.source || "")}</span>
          </div>
          <p class="print-sentence">${renderSentence(q.sentence, q.target)}</p>
          <div class="print-answer-box">
            <strong>解答：</strong>${escapeHtml(q.answer || "")}
            ${q.base ? `<br><strong>単語：</strong>${escapeHtml(q.base)}` : ""}
          </div>
        </article>
      `).join("");

      printSection.innerHTML = `
        <div class="print-page">
          <div class="print-title">
            <h2>古文単語例文テスト　問題</h2>
            <div class="print-meta">氏名：＿＿＿＿＿＿＿＿　日付：${dateText}</div>
          </div>
          <div class="print-list">${questionItems}</div>
        </div>
        <div class="print-page">
          <div class="print-title">
            <h2>古文単語例文テスト　解答</h2>
            <div class="print-meta">日付：${dateText}</div>
          </div>
          <div class="print-list">${answerItems}</div>
        </div>
      `;
    }

    async function fetchData() {
      let lastError = null;

      for (const url of DATA_URLS) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
          return await response.json();
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("データを読み込めませんでした。");
    }

    async function loadData() {
      try {
        allQuestions = await fetchData();
        allQuestions = allQuestions
          .filter(q => q && q.sentence && q.answer)
          .map((q, index) => ({ number: q.number || q.番号 || index + 1, ...q }));

        populateSourceFilter();
        createQuiz();
      } catch (error) {
        statusEl.textContent = "";
        quizEl.innerHTML = `
          <div class="error">
            <strong>データを読み込めませんでした。</strong><br>
            公開時は index.html と kobun_app_data_inflected_updated_target_fixed.json を同じフォルダに置いてください。<br>
            旧ファイル名の場合は kobun_app_data_inflected_updated.json でも読み込みを試します。<br>
            ローカルで直接HTMLを開く場合は、ブラウザの制限でJSONを読み込めないことがあります。
          </div>
        `;
        console.error(error);
      }
    }

    quizEl.addEventListener("click", (event) => {
      const answerButton = event.target.closest(".answer-button");
      if (answerButton) {
        toggleAnswer(Number(answerButton.dataset.index));
        return;
      }

      const saveButton = event.target.closest(".save-review-button");
      if (saveButton) {
        toggleSaveQuestion(Number(saveButton.dataset.index));
      }
    });

    document.getElementById("newQuizButton").addEventListener("click", createQuiz);
    document.getElementById("showAllButton").addEventListener("click", () => setAllAnswers(true));
    document.getElementById("hideAllButton").addEventListener("click", () => setAllAnswers(false));
    document.getElementById("resetFilterButton").addEventListener("click", resetFilters);
    document.getElementById("reviewModeButton").addEventListener("click", createReviewQuiz);
    document.getElementById("clearSavedButton").addEventListener("click", clearSavedQuestions);
    document.getElementById("printButton").addEventListener("click", () => {
      buildPrintSection();
      window.print();
    });

    questionCountEl.addEventListener("change", () => reviewMode ? createReviewQuiz() : createQuiz());
    sourceFilterEl.addEventListener("change", createQuiz);
    rowFilterEl.addEventListener("change", createQuiz);
    window.addEventListener("beforeprint", buildPrintSection);

    loadData();
  </script>
</body>
</html>
